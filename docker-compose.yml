services:
  postgres:
    image: postgres:16-alpine
    container_name: uai-store-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: uai_store
      POSTGRES_PASSWORD: uai_store
      POSTGRES_DB: uai_store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uai_store -d uai_store"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
